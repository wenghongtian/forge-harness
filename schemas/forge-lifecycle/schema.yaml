# Forge 生命周期 Schema（OpenSpec 自定义 schema）
# 放置于项目的 openspec/schemas/forge-lifecycle/ 目录下
# OpenSpec 会自动识别并使用

name: forge-lifecycle
version: 1
description: 完整的产品开发生命周期，包含产品设计、技术架构、实现和验收阶段。

artifacts:
  - id: proposal
    generates: proposal.md
    description: 产品愿景与变更理由 — 为什么要做
    template: proposal.md
    instruction: |
      定义要解决的问题、目标用户和成功标准。
      明确范围边界（做什么、不做什么）。
      使用第一性原理思考：从用户真实痛点出发。
    requires: []

  - id: product-spec
    generates: "specs/**/*.md"
    description: 产品规格，包含用户故事和验收标准 — 做什么
    template: product-spec.md
    instruction: |
      编写用户故事，使用 GIVEN/WHEN/THEN 场景格式。
      每个需求必须有可测试的验收标准。
      覆盖正常路径、边界情况和错误状态。
      包含空状态、加载状态和引导流程的设计。
      注意：此工件完成后需要人工审批才能继续。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 技术架构设计 — 怎么做
    template: tech-design.md
    instruction: |
      阅读项目的技术栈配置（openspec/config.yaml 中的 context 字段）。
      设计数据库模型、API 端点、组件架构。
      遵循前后端分离模式。
      记录关键决策的取舍。
      API 契约写入 specs/api-contract.md。
      注意：此工件完成后需要人工审批才能继续。
    requires:
      - product-spec

  - id: tasks
    generates: tasks.md
    description: 实现任务清单
    template: tasks.md
    instruction: |
      将实现拆分为有序的原子任务。
      按组划分：数据库 → 后端 → API 验证 → 前端 → 打磨。
      每个任务应该可以独立完成。
      使用复选框格式追踪进度。
    requires:
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    阅读上下文文件，按顺序完成待办任务。
    实现顺序：后端先行，然后 API 契约验证，最后前端。
    每完成一个任务，在 tasks.md 中标记为 [x]。
    所有任务完成后，需要人工验收。
